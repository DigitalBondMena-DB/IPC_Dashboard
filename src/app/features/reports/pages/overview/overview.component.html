<div class="flex flex-col gap-6">
  <!-- Header -->
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold text-[#202224]">Overview</h1>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
    <!-- Main Content (Left) -->
    <div class="xl:col-span-3 flex flex-col gap-8">
      <!-- Metrics Cards Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        @for (card of cards(); track card.label) {
          <div
            class="bg-white p-5 rounded-2xl shadow-sm border border-gray-50 flex flex-col justify-between h-32 relative group transition-all hover:shadow-md"
          >
            <div class="flex justify-between items-start">
              <span class="text-gray-400 font-medium">{{ card.label }}</span>
              <div class="p-2.5 rounded-lg" [ngClass]="[card.iconBgClass, card.iconTextClass]">
                <lucide-icon [name]="card.icon" size="14" />
              </div>
            </div>
            <div class="text-3xl font-bold text-gray-800">{{ card.value }}</div>
          </div>
        }
      </div>

      <!-- Latest Surveys Section -->
      <div class="flex flex-col gap-4">
        <h2 class="text-xl font-bold text-[#202224]">Lastest Surveys</h2>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-50 overflow-hidden">
          <app-b-data-table
            [columns]="tableColumns"
            [data]="recentSubmissions() || []"
            [loading]="isLoading()"
            [showPagination]="false"
            (viewClick)="onView($event)"
          />
        </div>
      </div>
    </div>

    <!-- Right Sidebar (Filters) -->
    <div class="flex flex-col gap-6">
      <div
        class="bg-white p-6 rounded-2xl shadow-sm border border-gray-50 flex flex-col gap-6 h-fit"
      >
        <h3 class="text-lg font-bold text-[#202224]">Filter</h3>

        <div class="flex flex-col gap-4">
          <!-- Governorate -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold">Governorate</label>
            <app-b-select
              placeholder="Select governorate name..."
              [options]="governorateOptions()"
              [ngModel]="selectedGovernorate()"
              (ngModelChange)="onGovernorateChange($event)"
            />
          </div>

          <!-- Directorate -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold">Directorate</label>
            <app-b-select
              placeholder="Select directorate name..."
              [options]="directorateOptions()"
              [ngModel]="selectedDirectorate()"
              [disabled]="!selectedGovernorate()"
              (ngModelChange)="onDirectorateChange($event)"
            />
          </div>

          <!-- Hospital -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold">Hospital</label>
            <app-b-select
              placeholder="Select hospital name..."
              [options]="hospitalOptions()"
              [ngModel]="selectedHospital()"
              [disabled]="!selectedDirectorate()"
              (ngModelChange)="onHospitalChange($event)"
            />
          </div>

          <!-- Division -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold">Division</label>
            <app-b-multi-select
              placeholder="Select division name..."
              [options]="divisionOptions()"
              [ngModel]="selectedDivisions()"
              (ngModelChange)="selectedDivisions.set($event)"
            />
          </div>

          <!-- Surveyor -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold">Surveyor</label>
            <input
              type="text"
              placeholder="Select surveyor name..."
              class="w-full px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
              [ngModel]="surveyorName()"
              (ngModelChange)="surveyorName.set($event)"
            />
          </div>

          <!-- Date -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-semibold">Date</label>
            <input
              type="date"
              class="w-full px-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
            />
          </div>
        </div>

        <button
          (click)="applyFilter()"
          class="w-full bg-blue-500 text-white py-3 rounded-xl font-semibold hover:bg-blue-600 transition-colors shadow-sm active:transform active:scale-[0.98]"
        >
          Apply Filter
        </button>
      </div>
    </div>
  </div>
</div>
