<div class="mt-6 space-y-8 bg-white py-6 px-4 border border-[#E1E7EF] rounded-xl">
  <div class="flex items-center gap-3 mb-6">
    <div class="p-2 bg-green-50 rounded-lg text-green-500">
      <div class="w-5 h-5 flex items-center justify-center font-bold text-lg">+</div>
    </div>
    <div>
      <h2 class="text-lg font-semibold text-black-400">
        {{ editingId() ? 'Edit Question' : 'Create Preliminary Question' }}
      </h2>
      <p class="text-sm text-gray-500">
        Specify details for the initial questioning fields in your survey.
      </p>
    </div>
  </div>

  <div class="bg-white p-6 space-y-6">
    <form [formGroup]="questionForm" class="space-y-6">
      <app-b-input
        id="question_text"
        label="Question Title"
        placeholder="Enter question title..."
        formControlName="text"
        [hasError]="isFieldInvalid('text')"
        class="text-black-400"
        errorMessage="Question title is required"
      />

      <div>
        <label class="block text-sm font-medium text-black-400 mb-1">Question Description</label>
        <textarea
          formControlName="description"
          placeholder="Enter question description..."
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[100px] text-black-400"
        ></textarea>
      </div>
      <div>
        <app-b-select
          id="question_type"
          label="Answer Type"
          placeholder="Select answer type"
          [options]="questionTypes"
          formControlName="type"
          class="text-black-400"
          [hasError]="isFieldInvalid('type')"
          errorMessage="Answer type is required"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-black-400 mb-1">Answers Hint</label>
        <p-editor
          formControlName="hint"
          [style]="{ height: '150px' }"
          placeholder="Enter answers hint..."
        >
          <ng-template #header>
            <span class="ql-formats">
              <button type="button" class="ql-bold" aria-label="Bold"></button>
              <button type="button" class="ql-italic" aria-label="Italic"></button>
              <button type="button" class="ql-underline" aria-label="Underline"></button>
            </span>
          </ng-template>
        </p-editor>
      </div>

      <!-- Answer Choices (Conditional) -->
      @if (showOptions()) {
        <div class="space-y-4">
          <div class="flex items-center justify-between">
            <label class="text-sm font-medium text-black-400">Answer Choices</label>
            <button
              type="button"
              (click)="addOption()"
              class="flex items-center gap-2 text-blue-500 text-sm font-medium hover:text-blue-600 transition-colors"
            >
              <lucide-angular [img]="plusIcon" [size]="16" />
              Add Choice
            </button>
          </div>

          <div formArrayName="options" class="space-y-3">
            @for (option of optionsArray.controls; track $index) {
              <div class="space-y-1">
                <div class="flex items-center gap-3">
                  <div
                    class="w-8 h-8 flex items-center justify-center border border-gray-200 rounded-lg text-gray-400"
                  >
                    <div class="w-4 h-4 border-2 border-gray-300 rounded"></div>
                  </div>
                  <input
                    [formControlName]="$index"
                    placeholder="Enter option here..."
                    class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 text-black-400 transition-colors"
                    [class.border-red-500]="isOptionInvalid($index)"
                    [class.border-gray-300]="!isOptionInvalid($index)"
                    [class.focus:ring-blue-500]="!isOptionInvalid($index)"
                    [class.focus:ring-red-500]="isOptionInvalid($index)"
                  />
                  <button
                    type="button"
                    (click)="removeOption($index)"
                    class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors"
                  >
                    <lucide-angular [img]="trashIcon" [size]="18" />
                  </button>
                </div>
                @if (isOptionInvalid($index)) {
                  <span class="text-red-500 text-xs ml-11 block">Choice is required</span>
                }
              </div>
            }
          </div>
        </div>
      }
    </form>
  </div>

  <!-- Form Footer Actions -->
  <div class="flex items-center justify-between pt-8 border-t border-gray-100 mt-8">
    <button
      (click)="goBack()"
      class="flex items-center gap-2 px-14 py-3 text-sm rounded-lg bg-[#F9F9F9] text-gray-703 hover:bg-gray-100 transition-colors font-medium"
    >
      Cancel
    </button>
    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="addQuestion()"
        class="flex items-center gap-2 bg-[#16A34A] text-white px-6.5 py-3 rounded-xl hover:bg-green-700 transition-colors font-medium"
      >
        {{ editingId() ? 'Update Question' : '+ Add Question' }}
      </button>
      @if (!editingId()) {
        <button
          type="button"
          (click)="saveQuestion()"
          class="flex items-center gap-2 bg-primary-500 text-white px-6.5 py-3 rounded-xl hover:bg-primary-500/80 transition-colors font-medium"
        >
          Save
        </button>
      }
    </div>
  </div>
</div>
